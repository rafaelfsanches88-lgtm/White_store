<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>White Store</title>
<style>
body {
  background: #0d0d0d;
  color: white;
  font-family: Arial;
  text-align: center;
}
.card {
  background: #1a1a1a;
  padding: 20px;
  margin: 20px;
  border-radius: 10px;
}
button {
  padding: 10px 20px;
  background: white;
  border: none;
  cursor: pointer;
}
</style>
</head>

  <body>

    <h1>White Store</h1>

<div class="card">
  <h2>Netflix</h2>
  <p id="preco-netflix"></p>
  <button onclick="comprar('Netflix', 'netflix')">Comprar</button>
</div>

<div class="card">
  <h2>Spotify</h2>
  <p id="preco-spotify"></p>
  <button onclick="comprar('Spotify', 'spotify')">Comprar</button>
</div>

<div class="card">
  <h2>Canva Pro</h2>
  <p id="preco-canva"></p>
  <button onclick="comprar('Canva Pro', 'canva')">Comprar</button>
</div>

   <div id="pagamento"></div>

    <script>

let precos = {
  netflix: localStorage.getItem("netflix") || 15,
  spotify: localStorage.getItem("spotify") || 10,
  canva: localStorage.getItem("canva") || 12
};

document.getElementById("preco-netflix").innerText = "R$ " + precos.netflix;
document.getElementById("preco-spotify").innerText = "R$ " + precos.spotify;
document.getElementById("preco-canva").innerText = "R$ " + precos.canva;

function comprar(produto, tipo) {
  let valor = precos[tipo];

  document.getElementById("pagamento").innerHTML = `
    <h2>Pagamento</h2>
    <p>Produto: ${produto}</p>
    <p>Valor: R$ ${valor}</p>
    <p>Chave Pix: SUA_CHAVE_AQUI</p>
    <button onclick="alert('Aguarde confirmação!')">Já paguei</button>
  `;
}

</script>

  `;
}
</script>

    </body>
</html>
:::
